:root { --bg:#0f172a; --panel:#111827; --text:#e5e7eb; --muted:#94a3b8; --accent:#60a5fa; --edge:rgba(148,163,184,.35); }
* { box-sizing:border-box; }
body { margin:0; font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
.app { display:grid; grid-template-columns:340px 1fr; min-height:100vh; }
.sidebar { padding:20px; border-right:1px solid rgba(148,163,184,.2); background:linear-gradient(180deg,#111827,#0f172a); overflow-y:auto; }
.sidebar h1 { margin:0 0 6px; font-size:22px; }
.sidebar p { color:var(--muted); margin:0 0 18px; line-height:1.5; }
.controls { display:grid; gap:10px; margin-bottom:18px; }
input,select,button { width:100%; border:1px solid rgba(148,163,184,.28); background:#020617; color:var(--text); border-radius:10px; padding:10px 12px; font-size:14px; }
button { cursor:pointer; background:#1d4ed8; border-color:#2563eb; font-weight:700; }
.stats { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; margin-bottom:18px; }
.stat { background:rgba(15,23,42,.8); border:1px solid rgba(148,163,184,.18); border-radius:12px; padding:10px; }
.stat strong { display:block; font-size:18px; }
.stat span { color:var(--muted); font-size:12px; }
.legend { display:grid; gap:8px; margin-bottom:18px; }
.legend-item { display:flex; gap:8px; align-items:center; color:var(--muted); font-size:13px; }
.swatch { width:12px; height:12px; border-radius:999px; }
.details { background:rgba(15,23,42,.92); border:1px solid rgba(148,163,184,.2); border-radius:14px; padding:14px; }
.details h2 { font-size:15px; word-break:break-word; }
.details code { color:#bfdbfe; white-space:pre-wrap; word-break:break-word; }
.canvas-wrap { position:relative; overflow:auto; }
.canvas { position:relative; min-width:1400px; min-height:900px; }
.edges { position:absolute; left:0; top:0; pointer-events:none; overflow:visible; }
.node { position:absolute; width:240px; min-height:76px; border-radius:16px; padding:12px; background:#1f2937; border:1px solid rgba(148,163,184,.35); box-shadow:0 20px 45px rgba(0,0,0,.25); cursor:pointer; transition:transform 120ms ease,border-color 120ms ease,opacity 120ms ease; }
.node:hover { transform:translateY(-3px); border-color:var(--accent); }
.node.selected { outline:3px solid rgba(96,165,250,.55); }
.node.hidden { opacity:.08; pointer-events:none; }
.node-title { font-weight:800; font-size:13px; word-break:break-word; line-height:1.25; }
.node-role { margin-top:8px; color:var(--muted); font-size:12px; }
.node-meta { margin-top:6px; color:#cbd5e1; font-size:11px; }
.entry { background:#102a43; border-color:#60a5fa; } .frontend { background:#332b11; border-color:#facc15; } .backend { background:#12312f; border-color:#2dd4bf; } .tooling { background:#3a1720; border-color:#fb7185; } .config { background:#23183b; border-color:#a78bfa; } .stylesheet { background:#1f2937; border-color:#cbd5e1; } .doc { background:#172033; border-color:#94a3b8; }
.edge-line { stroke:var(--edge); stroke-width:1.8; marker-end:url(#arrow); } .edge-line.dimmed { opacity:.08; }
@media (max-width:900px) { .app { grid-template-columns:1fr; } .sidebar { border-right:0; border-bottom:1px solid rgba(148,163,184,.2); } }
</style>
</head>
